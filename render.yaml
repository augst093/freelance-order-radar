services:
  - type: worker
    name: freelance-order-radar
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    plan: free
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_USER_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SCAN_INTERVAL_MINUTES
        value: "2"
      - key: MIN_SCORE_TO_NOTIFY
        value: "7"
      - key: MAX_NOTIFICATIONS_PER_SCAN
        value: "5"
      - key: FRESHNESS_MAX_MINUTES
        value: "60"
      - key: DATABASE_PATH
        value: "/tmp/freelance_radar.db"
    disk:
      name: radar-data
      mountPath: /data
      sizeGB: 1
